}
function minsLeft(ts) {

function fmtAppointment(ts) {
  const d = new Date(ts);

  if (sameDay) return `${t} today`;
  if (tomorrow) return `${t} tomorrow`;
  return `${t} on ${fmtDay(ts)}`;
}
